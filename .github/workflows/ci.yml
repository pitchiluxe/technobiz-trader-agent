name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install black isort pylint

      - name: black (format check)
        run: black --check --diff .

      - name: isort (import order)
        run: isort --check-only --diff .

      - name: pylint
        # Only lint our source packages; ignore generated/vendor dirs
        run: pylint agents config market_data database utils api --errors-only

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DATA_PROVIDER: tradingview
      TRADINGVIEW_API_TYPE: free
      DATABASE_URL: sqlite:///ci_test.db
      GUI_SECRET_KEY: ci-test-secret-key-not-real

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt anyio[asyncio]

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/integration

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short
        # Integration tests are allowed to fail on CI (require live MT5/API keys)
        continue-on-error: true

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag technobiz-trader:ci .

      - name: Smoke test — container starts without error
        run: |
          docker run --rm \
            -e ENVIRONMENT=development \
            -e DATA_PROVIDER=tradingview \
            -e TRADINGVIEW_API_TYPE=free \
            -e DATABASE_URL=sqlite:///smoke.db \
            -e GUI_SECRET_KEY=smoke-test-key \
            --entrypoint python \
            technobiz-trader:ci \
            -c "from config.settings import settings; print('Settings OK:', settings.ENVIRONMENT)"
